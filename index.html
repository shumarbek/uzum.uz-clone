<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uzum Market</title>
    <link rel="stylesheet" href="./css/main.css">
    <link rel="stylesheet" href="./css/layout/header.css">
</head>

<body>
    <header>
        <div class="top__header">
            <div class="container">
                <div class="header__left">
                    <div class="header__location">
                        <div class="icon__div">
                            <img src="./assets/icons/pin.png" alt="">
                        </div>
                        <span>Toshkent</span>
                        <div class="icon__div">
                            <img src="./assets/icons/down-arrow.png" alt="">
                        </div>
                    </div>
                    <a href="" class="link__button">Topshirish punktlari</a>
                </div>
                <div class="header__right">
                    <a href="" class="link__button">Sotuvchi bo'lish</a>
                    <span class="header__right__line">|</span>
                    <a href="" class="link__button">Topshirish punktini ochish</a>
                    <a href="" class="link__button">Savollarim</a>
                    <a href="" class="link__button">Buyurtmalarim</a>
                    <select name="" id="" class="language__select">
                        <option value="" selected>
                            <div class="icon__div">
                                <img src="./assets/icons/uz-flag-icon.jpg" alt="">
                            </div>
                            <span>O`zbekcha</span>
                        </option>
                        <option value="">
                            <div class="icon__div">
                                <img src="./assets/icons/ru-flag-icon.jpg" alt="">
                            </div>
                            <span>Русский</span>
                        </option>
                    </select>
                </div>
            </div>
        </div>
        <div class="container">
            <div class="logo">
                <img src="./assets/icons/logo-icon+name.png" alt="Uzum">
            </div>
            <div class="header__middle">
                <div class="category__button">
                    <div class="icon__div">
                        <img src="./assets/icons/options.png" alt="">
                    </div>
                    <span>Katalog</span>
                </div>
                <div class="search">
                    <input type="text" class="search__input" placeholder="Mahsulotlar va turkumlar izlash">
                    <button type="submit" class="search__button">
                        <div class="icon__div">
                            <img src="./assets/icons/loupe.png" alt="">
                        </div>
                    </button>
                </div>
            </div>
            <div class="header__actions">
                <div class="header__button">
                    <div class="icon__div">
                        <img src="./assets/icons/people.png" alt="">
                    </div>
                    <span>Kirish</span>
                </div>
                <div class="header__button">
                    <div class="icon__div">
                        <img src="./assets/icons/heart.png" alt="">
                    </div>
                    <span>Saralangan</span>
                </div>
                <div class="header__button">
                    <div class="icon__div">
                        <img src="./assets/icons/shopping-bag.png" alt="">
                    </div>
                    <span>Savat</span>
                </div>
            </div>
        </div>
        <div class="container">
            <div class="top__categories">
                <div class="top__category__button">
                    <div class="icon__div">
                        <img src="./assets/images/category-1.png" alt="">
                    </div>
                    <span>Hafta tovarlari</span>
                </div>
                <div class="top__category__button">
                    <div class="icon__div">
                        <img src="./assets/images/category-2.png" alt="">
                    </div>
                    <span>Bahorgi kolleksiya</span>
                </div>
                <div class="top__category__button">
                    <div class="icon__div">
                        <img src="./assets/images/category-3.png" alt="">
                    </div>
                    <span>Sizning go'zalligingiz</span>
                </div>
                <div class="top__category__button">
                    <div class="icon__div">
                        <img src="./assets/images/category-4.png" alt="">
                    </div>
                    <span>Hobbi va ijod</span>
                </div>
                <div class="top__category__button">
                    <div class="icon__div">
                        <img src="./assets/images/category-5.png" alt="">
                    </div>
                    <span>Smartfonlar</span>
                </div>
                <div class="top__category__button">
                    <div class="icon__div">
                        <img src="./assets/images/category-6.png" alt="">
                    </div>
                    <span>Ramazon oyi</span>
                </div>
                <a class="top__category__link">
                    <span>Mebel</span>
                </a>
                <a class="top__category__link">
                    <span>Turizm, baliq ovi va ovchilik</span>
                </a>
                <a class="top__category__link">
                    <span>Yana</span>
                    <div class="icon__div">
                        <img src="./assets/icons/down-arrow.png" alt="">
                    </div>
                </a>
            </div>
        </div>
    </header>
    <main></main>
    <footer></footer>

    <script src="./js/main.js"></script>
</body>

</html>
